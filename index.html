<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Académique - Rétro Bleu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <h1>POKÉDEX SYSTEM</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Nom ou ID..." aria-label="Rechercher un Pokémon">
            <button id="search-btn">CHERCHER</button>
        </div>
    </header>

    <div class="app-layout">
        
        <aside class="sidebar">
            <section class="history-section">
                <h2>HISTORIQUE</h2>
                <ul id="history-list" class="pokemon-list">
                    </ul>
            </section>

            <section class="random-section">
                <h2>DÉCOUVRIR</h2>
                <ul id="random-list" class="pokemon-list">
                    </ul>
            </section>
        </aside>

        <main class="main-content">
            <div id="result-container" class="result-card">
                <p class="placeholder-text">En attente de recherche...</p>
                </div>
        </main>
    </div>

    <div id="pokemon-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
